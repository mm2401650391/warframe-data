<!DOCTYPE html>
<html>
<body>
    <pre id="out">加载中...</pre>
    <script>
        fetch('https://你的用户名.github.io/warframe-data/data/worldstate.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => {
                document.getElementById('out').textContent = JSON.stringify({
                    earthIsDay: d.EarthCycle?.isDay,
                    earthExpiry: d.EarthCycle?.Expiry?.$date?.$numberLong,
                    cetusIsDay: d.CetusCycle?.isDay,
                    cetusExpiry: d.CetusCycle?.Expiry?.$date?.$numberLong,
                    grabTime: d._grabTime
                }, null, 2);
            })
            .catch(e => document.getElementById('out').textContent = '错误: ' + e);
    </script>
</body>
</html>
